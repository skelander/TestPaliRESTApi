<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Palindrome Checker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.25rem;
    }

    p.subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }

    label {
      font-size: 0.85rem;
      font-weight: 500;
      color: #444;
    }

    input {
      flex: 1;
      padding: 0.65rem 1rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #555; }

    button {
      padding: 0.65rem 1.25rem;
      background: #111;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #333; }
    button:disabled { background: #999; cursor: default; }

    .btn-full { width: 100%; margin-top: 0.25rem; }

    .result {
      margin-top: 1.25rem;
      padding: 1rem 1.25rem;
      border-radius: 8px;
      font-size: 0.95rem;
      display: none;
    }

    .result.yes { background: #e6f4ea; color: #1e7e34; }
    .result.no  { background: #fdecea; color: #b71c1c; }

    .result .label {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .error-msg {
      color: #b71c1c;
      font-size: 0.85rem;
      margin-top: 0.75rem;
      display: none;
    }

    .user-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
    }

    .user-bar span { font-size: 0.85rem; color: #666; }

    .logout-btn {
      padding: 0.3rem 0.75rem;
      font-size: 0.8rem;
      background: #eee;
      color: #333;
      border-radius: 6px;
    }

    .logout-btn:hover { background: #ddd; }

    #login-view, #app-view { display: none; }
  </style>
</head>
<body>
  <div class="card">

    <!-- Login -->
    <div id="login-view">
      <h1>Sign in</h1>
      <p class="subtitle">Enter your username and password to continue.</p>

      <div class="field">
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="e.g. 1" autocomplete="username" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" />
      </div>

      <button class="btn-full" onclick="login()">Sign in</button>
      <div class="error-msg" id="login-error">Incorrect username or password.</div>
    </div>

    <!-- App -->
    <div id="app-view">
      <div class="user-bar">
        <span id="greeting"></span>
        <button class="logout-btn" onclick="logout()">Sign out</button>
      </div>

      <h1>Palindrome Checker</h1>
      <p class="subtitle">Type a word or phrase to check if it reads the same forwards and backwards.</p>

      <div class="input-row">
        <input id="input" type="text" placeholder="e.g. racecar" />
        <button id="btn" onclick="check()">Check</button>
      </div>

      <div class="result" id="result">
        <div class="label" id="result-label"></div>
        <div id="result-message"></div>
      </div>
    </div>

  </div>

  <script>
    const API = 'https://palindrome-rikard.fly.dev/palindrome';
    const USERS = { '1': '1', '2': '2', '3': '3' };

    function init() {
      const user = sessionStorage.getItem('user');
      if (user) {
        showApp(user);
      } else {
        document.getElementById('login-view').style.display = 'block';
      }
    }

    function login() {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      const errEl = document.getElementById('login-error');

      if (USERS[user] && USERS[user] === pass) {
        sessionStorage.setItem('user', user);
        errEl.style.display = 'none';
        showApp(user);
      } else {
        errEl.style.display = 'block';
      }
    }

    function logout() {
      sessionStorage.removeItem('user');
      document.getElementById('app-view').style.display = 'none';
      document.getElementById('result').style.display = 'none';
      document.getElementById('input').value = '';
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
      document.getElementById('login-view').style.display = 'block';
    }

    function showApp(user) {
      document.getElementById('login-view').style.display = 'none';
      document.getElementById('greeting').textContent = `Signed in as user ${user}`;
      document.getElementById('app-view').style.display = 'block';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (document.getElementById('login-view').style.display !== 'none') login();
        else check();
      }
    });

    async function check() {
      const input = document.getElementById('input').value.trim();
      if (!input) return;

      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.textContent = '...';

      try {
        const res = await fetch(`${API}/${encodeURIComponent(input)}`);
        const data = await res.json();
        showResult(data);
      } catch {
        showError();
      } finally {
        btn.disabled = false;
        btn.textContent = 'Check';
      }
    }

    function showResult(data) {
      const el = document.getElementById('result');
      el.className = 'result ' + (data.isPalindrome ? 'yes' : 'no');
      el.style.display = 'block';
      document.getElementById('result-label').textContent = data.isPalindrome ? 'Yes!' : 'No';
      document.getElementById('result-message').textContent = data.message;
    }

    function showError() {
      const el = document.getElementById('result');
      el.className = 'result no';
      el.style.display = 'block';
      document.getElementById('result-label').textContent = 'Error';
      document.getElementById('result-message').textContent = 'Could not reach the API. Try again.';
    }

    init();
  </script>
</body>
</html>
