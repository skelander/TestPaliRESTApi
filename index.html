<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Palindrome Checker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.25rem;
    }

    p.subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
    }

    input {
      flex: 1;
      padding: 0.65rem 1rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #555; }

    button {
      padding: 0.65rem 1.25rem;
      background: #111;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #333; }
    button:disabled { background: #999; cursor: default; }

    .result {
      margin-top: 1.25rem;
      padding: 1rem 1.25rem;
      border-radius: 8px;
      font-size: 0.95rem;
      display: none;
    }

    .result.yes { background: #e6f4ea; color: #1e7e34; }
    .result.no  { background: #fdecea; color: #b71c1c; }

    .result .label {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Palindrome Checker</h1>
    <p class="subtitle">Type a word or phrase to check if it reads the same forwards and backwards.</p>

    <div class="input-row">
      <input id="input" type="text" placeholder="e.g. racecar" />
      <button id="btn" onclick="check()">Check</button>
    </div>

    <div class="result" id="result">
      <div class="label" id="result-label"></div>
      <div id="result-message"></div>
    </div>
  </div>

  <script>
    const API = 'https://palindrome-rikard.fly.dev/palindrome';

    document.getElementById('input').addEventListener('keydown', e => {
      if (e.key === 'Enter') check();
    });

    async function check() {
      const input = document.getElementById('input').value.trim();
      if (!input) return;

      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.textContent = '...';

      try {
        const res = await fetch(`${API}/${encodeURIComponent(input)}`);
        const data = await res.json();
        showResult(data);
      } catch {
        showError();
      } finally {
        btn.disabled = false;
        btn.textContent = 'Check';
      }
    }

    function showResult(data) {
      const el = document.getElementById('result');
      el.className = 'result ' + (data.isPalindrome ? 'yes' : 'no');
      el.style.display = 'block';
      document.getElementById('result-label').textContent = data.isPalindrome ? 'Yes!' : 'No';
      document.getElementById('result-message').textContent = data.message;
    }

    function showError() {
      const el = document.getElementById('result');
      el.className = 'result no';
      el.style.display = 'block';
      document.getElementById('result-label').textContent = 'Error';
      document.getElementById('result-message').textContent = 'Could not reach the API. Try again.';
    }
  </script>
</body>
</html>
