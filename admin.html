<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Feature Toggles</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }

    p.subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }

    label {
      font-size: 0.85rem;
      font-weight: 500;
      color: #444;
    }

    input[type="text"],
    input[type="password"] {
      padding: 0.65rem 1rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    input[type="text"]:focus,
    input[type="password"]:focus { border-color: #555; }

    button {
      width: 100%;
      padding: 0.65rem 1.25rem;
      background: #111;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.25rem;
    }

    button:hover { background: #333; }

    .error-msg {
      color: #b71c1c;
      font-size: 0.85rem;
      margin-top: 0.75rem;
      display: none;
    }

    .user-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .user-bar span { font-size: 0.85rem; color: #666; }

    .logout-btn {
      padding: 0.3rem 0.75rem;
      font-size: 0.8rem;
      background: #eee;
      color: #333;
      border-radius: 6px;
      width: auto;
      margin-top: 0;
    }

    .logout-btn:hover { background: #ddd; }

    table { width: 100%; border-collapse: collapse; }

    th {
      text-align: left;
      font-size: 0.8rem;
      color: #999;
      font-weight: 500;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #eee;
    }

    th:last-child { text-align: center; }

    td {
      padding: 0.85rem 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 0.95rem;
    }

    td:last-child { text-align: center; }

    input[type="checkbox"] {
      width: 1.1rem;
      height: 1.1rem;
      cursor: pointer;
      accent-color: #111;
    }

    .saved-msg {
      margin-top: 1.25rem;
      font-size: 0.85rem;
      color: #1e7e34;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #login-view, #admin-view { display: none; }
  </style>
</head>
<body>
  <div class="card">

    <!-- Login -->
    <div id="login-view">
      <h1>Sign in</h1>
      <p class="subtitle">Admin access required.</p>

      <div class="field">
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="e.g. 1" autocomplete="username" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" />
      </div>

      <button onclick="login()">Sign in</button>
      <div class="error-msg" id="login-error">Incorrect username or password.</div>
    </div>

    <!-- Admin -->
    <div id="admin-view">
      <div class="user-bar">
        <span id="greeting"></span>
        <button class="logout-btn" onclick="logout()">Sign out</button>
      </div>

      <h1>Feature Toggles</h1>
      <p class="subtitle">Enable or disable the palindrome API per user.</p>

      <table>
        <thead>
          <tr>
            <th>User</th>
            <th>API enabled</th>
          </tr>
        </thead>
        <tbody id="toggle-rows"></tbody>
      </table>

      <div class="saved-msg" id="saved-msg">Changes saved.</div>
    </div>

  </div>

  <script>
    const CREDENTIALS = { 'admin': 'admin' };
    const MANAGED_USERS = ['1', '2', '3'];
    const FEATURES_KEY = 'features';

    function init() {
      const user = sessionStorage.getItem('user');
      if (user) {
        showAdmin(user);
      } else {
        document.getElementById('login-view').style.display = 'block';
      }
    }

    function login() {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      const errEl = document.getElementById('login-error');

      if (CREDENTIALS[user] && CREDENTIALS[user] === pass) {
        sessionStorage.setItem('user', user);
        errEl.style.display = 'none';
        showAdmin(user);
      } else {
        errEl.style.display = 'block';
      }
    }

    function logout() {
      sessionStorage.removeItem('user');
      document.getElementById('admin-view').style.display = 'none';
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
      document.getElementById('login-view').style.display = 'block';
    }

    function showAdmin(user) {
      document.getElementById('login-view').style.display = 'none';
      document.getElementById('greeting').textContent = `Signed in as user ${user}`;
      document.getElementById('admin-view').style.display = 'block';
      renderToggles();
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && document.getElementById('login-view').style.display !== 'none') login();
    });

    function loadFeatures() {
      const features = JSON.parse(localStorage.getItem(FEATURES_KEY) || '{}');
      return features.api || {};
    }

    function saveFeatures(perUser) {
      const features = JSON.parse(localStorage.getItem(FEATURES_KEY) || '{}');
      features.api = perUser;
      localStorage.setItem(FEATURES_KEY, JSON.stringify(features));

      const msg = document.getElementById('saved-msg');
      msg.style.opacity = '1';
      setTimeout(() => msg.style.opacity = '0', 1500);
    }

    function renderToggles() {
      const perUser = loadFeatures();
      const tbody = document.getElementById('toggle-rows');
      tbody.innerHTML = '';

      MANAGED_USERS.forEach(user => {
        const enabled = perUser[user] !== false;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>User ${user}</td>
          <td><input type="checkbox" ${enabled ? 'checked' : ''} data-user="${user}" /></td>
        `;
        tbody.appendChild(tr);
      });

      tbody.addEventListener('change', e => {
        if (e.target.type !== 'checkbox') return;
        const current = loadFeatures();
        current[e.target.dataset.user] = e.target.checked;
        saveFeatures(current);
      });
    }

    init();
  </script>
</body>
</html>
