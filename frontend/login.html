<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Palindrome</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 60%, #4c1d95 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    }

    .logo {
      font-size: 2rem;
      font-weight: 800;
      color: #4f46e5;
      letter-spacing: -1px;
      margin-bottom: 0.25rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 0.25rem;
    }

    p.subtitle {
      color: #6b7280;
      font-size: 0.875rem;
      margin-bottom: 2rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }

    label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #374151;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input {
      padding: 0.75rem 1rem;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      color: #111;
    }

    input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,0.15);
    }

    button {
      width: 100%;
      padding: 0.8rem;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 0.5rem;
    }

    button:hover { background: #4338ca; }
    button:active { transform: scale(0.98); }

    .error-msg {
      color: #dc2626;
      font-size: 0.85rem;
      margin-top: 0.75rem;
      display: none;
      text-align: center;
    }

    .hint-box {
      margin-top: 1.5rem;
      padding: 1rem 1.25rem;
      background: #f5f3ff;
      border: 1px solid #e0e7ff;
      border-radius: 12px;
    }

    .hint-box p {
      font-size: 0.8rem;
      color: #4338ca;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .hint-box table {
      width: 100%;
      font-size: 0.8rem;
      border-collapse: collapse;
      color: #374151;
    }

    .hint-box td {
      padding: 0.2rem 0.5rem 0.2rem 0;
    }

    .hint-box td:first-child {
      color: #6b7280;
      width: 6rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Palindrome</div>
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to continue.</p>

    <div class="field">
      <label for="username">Username</label>
      <input id="username" type="text" placeholder="Enter username" autocomplete="username" />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Enter password" autocomplete="current-password" />
    </div>

    <button onclick="login()">Sign in</button>
    <div class="error-msg" id="login-error">Incorrect username or password.</div>

    <a href="about.html" style="display:block;text-align:center;margin-top:1.25rem;font-size:0.8rem;color:#4f46e5;text-decoration:none;font-weight:600;">Technical overview →</a>
    <a href="how-we-did-it.html" style="display:block;text-align:center;margin-top:0.5rem;font-size:0.8rem;color:#4f46e5;text-decoration:none;font-weight:600;">How we did it →</a>

    <div class="hint-box">
      <p>Test accounts</p>
      <table>
        <tr><td>Regular users</td><td><strong>1</strong>, <strong>2</strong>, or <strong>3</strong> — password same as username</td></tr>
        <tr><td>Admin</td><td><strong>admin</strong> — password <strong>admin</strong></td></tr>
      </table>
    </div>
  </div>

  <script>
    const AUTH_API = '__API_URL__/auth/login';

    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('login-error');

      try {
        const res = await fetch(AUTH_API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        if (res.ok) {
          const data = await res.json();
          sessionStorage.setItem('user', data.user);
          sessionStorage.setItem('token', data.token);
          window.location.href = data.role === 'admin' ? 'admin.html' : 'index.html';
        } else {
          errEl.style.display = 'block';
        }
      } catch {
        errEl.textContent = 'Could not reach the server. Try again.';
        errEl.style.display = 'block';
      }
    }
  </script>
</body>
</html>
