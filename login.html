<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }

    p.subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }

    label { font-size: 0.85rem; font-weight: 500; color: #444; }

    input {
      padding: 0.65rem 1rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #555; }

    button {
      width: 100%;
      padding: 0.65rem 1.25rem;
      background: #111;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.25rem;
    }

    button:hover { background: #333; }

    .error-msg {
      color: #b71c1c;
      font-size: 0.85rem;
      margin-top: 0.75rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sign in</h1>
    <p class="subtitle">Enter your username and password to continue.</p>

    <div class="field">
      <label for="username">Username</label>
      <input id="username" type="text" placeholder="e.g. 1" autocomplete="username" />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" />
    </div>

    <button onclick="login()">Sign in</button>
    <div class="error-msg" id="login-error">Incorrect username or password.</div>
  </div>

  <script>
    const USERS = { '1': '1', '2': '2', '3': '3', 'admin': 'admin' };

    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

    function login() {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;

      if (USERS[user] && USERS[user] === pass) {
        sessionStorage.setItem('user', user);
        window.location.href = user === 'admin' ? 'admin.html' : 'index.html';
      } else {
        document.getElementById('login-error').style.display = 'block';
      }
    }
  </script>
</body>
</html>
